<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vision OCR - Tombol di Tengah</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col justify-between font-sans p-4 overflow-hidden">

    <div class="w-full max-w-md mx-auto flex flex-col h-full justify-between space-y-3">
        
        <div class="text-center py-1">
            <h1 class="text-xl font-bold bg-gradient-to-r from-yellow-400 to-amber-500 bg-clip-text text-transparent">Vision Cloud Scanner</h1>
            <p class="text-[10px] text-gray-400">Google Lens Engine • Kamera 1/2 Layar</p>
        </div>
        
        <div class="relative w-full h-[50vh] bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-800 flex items-center justify-center">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
            <img id="scanned-image" class="hidden w-full h-full object-cover" src="" alt="Hasil foto">

            <div id="loading" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center space-y-2 z-10">
                <div class="w-9 h-9 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-xs text-yellow-400 animate-pulse">Google Vision sedang memindai...</p>
            </div>
        </div>

        <div class="py-1">
            <button id="btn-capture" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-semibold py-3 rounded-xl shadow-lg transition text-sm flex items-center justify-center gap-2">
                📸 Ambil Foto Dokumen
            </button>
            
            <div id="action-group" class="hidden flex gap-2">
                <button id="btn-retry" class="w-1/3 bg-gray-800 hover:bg-gray-700 active:scale-95 text-white font-semibold py-3 rounded-xl transition text-sm">
                    🔄 Foto Ulang
                </button>
                <button id="btn-copy" class="w-2/3 bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-bold py-3 rounded-xl transition text-sm flex items-center justify-center gap-1 shadow-lg">
                    📋 Salin Teks Hasil Scan
                </button>
            </div>
        </div>

        <div class="flex-grow flex flex-col min-h-0 space-y-1 pb-2">
            <label class="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Hasil Teks Dokumen:</label>
            <textarea id="result-text" class="w-full flex-grow p-3 bg-gray-900 border border-gray-800 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:outline-none text-xs text-gray-200 resize-none overflow-y-auto" placeholder="Hasil scan teks tingkat tinggi akan muncul di sini..." readonly></textarea>
        </div>

    </div>

    <script>
        // API Key Google Cloud Vision milikmu
        const VISION_API_KEY = "AQ.Ab8RN6IyCSkXqF3rEMjB12IrfCLVD6MRFoxWsdm74wVLnOwT3A"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const scannedImage = document.getElementById('scanned-image');
        const btnCapture = document.getElementById('btn-capture');
        const actionGroup = document.getElementById('action-group');
        const btnRetry = document.getElementById('btn-retry');
        const btnCopy = document.getElementById('btn-copy');
        const loading = document.getElementById('loading');
        const resultText = document.getElementById('result-text');

        // Buka Kamera Belakang HP
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
                video.classList.remove('hidden');
                scannedImage.classList.add('hidden');
                btnCapture.classList.remove('hidden');
                actionGroup.classList.add('hidden');
            } catch (err) {
                alert("Mohon izinkan akses kamera pada pengaturan browser HP Anda.");
                console.error(err);
            }
        }

        // Jalankan kamera otomatis saat web selesai dimuat
        window.addEventListener('DOMContentLoaded', startCamera);

        // Aksi Tombol Ambil Foto
        btnCapture.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            scannedImage.src = dataUrl;
            
            scannedImage.classList.remove('hidden');
            video.classList.add('hidden');
            
            btnCapture.classList.add('hidden');
            actionGroup.classList.remove('hidden');

            const stream = video.srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());

            // Panggil fungsi Cloud Vision API pilihanmu
            processWithVisionAPI(dataUrl);
        });

        // Aksi Reset / Foto Ulang
        btnRetry.addEventListener('click', () => {
            resultText.value = "";
            startCamera();
        });

        // Fungsi Memproses Gambar Menggunakan Google Cloud Vision API
        async function processWithVisionAPI(base64DataUrl) {
            loading.classList.remove('hidden');
            resultText.value = "Google Vision sedang memindai dokumen Anda...";

            try {
                // Potong string base64 murni setelah tanda koma
                const base64Image = base64DataUrl.split(',');

                // Struktur Request Body sesuai standar Google Cloud Vision API
                const requestBody = {
                    requests: [{
                        image: {
                            content: base64Image
                        },
                        features: [{
                            type: "TEXT_DETECTION"
                        }]
                    }]
                };

                // Kirim data ke endpoint Cloud Vision API
                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });

                const result = await response.json();
                
                // Parsing data response TEXT_DETECTION
                if (result.responses && result.responses && result.responses.fullTextAnnotation) {
                    resultText.value = result.responses.fullTextAnnotation.text;
                } else {
                    resultText.value = "Tidak ada teks yang terdeteksi di dokumen ini. Coba foto lebih dekat dan pastikan cahaya terang.";
                }

            } catch (error) {
                resultText.value = "Terjadi kesalahan koneksi ke server Google Vision API.";
                console.error(error);
            } finally {
                loading.classList.add('hidden');
            }
        }

        // Aksi Tombol Salin Teks
        btnCopy.addEventListener('click', () => {
            if (!resultText.value || resultText.value.startsWith("Google Vision")) return;
            navigator.clipboard.writeText(resultText.value);
            alert("Teks dokumen berhasil disalin!");
        });
    </script>
</body>
</html>
