<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web OCR - Kamera 1/2 Layar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col justify-between font-sans p-4 overflow-hidden">

    <div class="w-full max-w-md mx-auto flex flex-col h-full justify-between space-y-3">
        
        <div class="text-center py-1">
            <h1 class="text-xl font-bold text-blue-400">DocuScan Mobile</h1>
            <p class="text-[10px] text-gray-400">Kamera diset 1/2 tinggi layar HP</p>
        </div>
        
        <div class="relative w-full h-[50vh] bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-800 flex items-center justify-center">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            
            <canvas id="canvas" class="hidden"></canvas>
            
            <img id="scanned-image" class="hidden w-full h-full object-cover" src="" alt="Hasil foto">

            <div id="loading" class="hidden absolute inset-0 bg-black/70 flex flex-col items-center justify-center space-y-2 z-10">
                <div class="w-10 h-10 border-4 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-xs font-medium text-blue-400">Membaca teks... <span id="progress">0%</span></p>
            </div>
        </div>

        <div class="flex-grow flex flex-col min-h-0 space-y-1">
            <label class="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Hasil Teks:</label>
            <textarea id="result-text" class="w-full flex-grow p-3 bg-gray-800 border border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-xs text-gray-200 resize-none overflow-y-auto" placeholder="Teks akan muncul di sini..." readonly></textarea>
        </div>
        
        <div class="pb-2">
            <button id="btn-capture" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-semibold py-3 rounded-xl shadow-lg transition text-sm flex items-center justify-center gap-2">
                📸 Ambil Foto Dokumen
            </button>
            
            <div id="action-group" class="hidden flex gap-2">
                <button id="btn-retry" class="w-1/2 bg-gray-700 hover:bg-gray-600 active:scale-95 text-white font-semibold py-3 rounded-xl transition text-sm">
                    🔄 Ulangi Foto
                </button>
                <button id="btn-copy" class="w-1/2 bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-semibold py-3 rounded-xl transition text-sm">
                    📋 Salin Teks
                </button>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const scannedImage = document.getElementById('scanned-image');
        const btnCapture = document.getElementById('btn-capture');
        const actionGroup = document.getElementById('action-group');
        const btnRetry = document.getElementById('btn-retry');
        const btnCopy = document.getElementById('btn-copy');
        const loading = document.getElementById('loading');
        const progressSpan = document.getElementById('progress');
        const resultText = document.getElementById('result-text');

        // Buka kamera belakang dengan resolusi tinggi
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: { ideal: "environment" },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });
                video.srcObject = stream;
                video.classList.remove('hidden');
                scannedImage.classList.add('hidden');
                btnCapture.classList.remove('hidden');
                actionGroup.classList.add('hidden');
            } catch (err) {
                alert("Gagal mengakses kamera.");
                console.error(err);
            }
        }

        window.addEventListener('DOMContentLoaded', startCamera);

        // Ambil foto berdasarkan apa yang ada di video stream
        btnCapture.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            
            // Resolusi canvas tetap tinggi agar teks tidak pecah saat di-OCR
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            
            scannedImage.src = dataUrl;
            scannedImage.classList.remove('hidden');
            video.classList.add('hidden');
            
            btnCapture.classList.add('hidden');
            actionGroup.classList.remove('hidden');

            const stream = video.srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            processOCR(dataUrl);
        });

        btnRetry.addEventListener('click', () => {
            resultText.value = "";
            startCamera();
        });

        async function processOCR(imageSrc) {
            loading.classList.remove('hidden');
            resultText.value = "Sedang memproses teks...";
            
            try {
                const result = await Tesseract.recognize(
                    imageSrc,
                    'ind+eng',
                    {
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                progressSpan.innerText = Math.floor(m.progress * 100) + "%";
                            }
                        }
                    }
                );
                resultText.value = result.data.text || "Teks tidak terdeteksi.";
            } catch (error) {
                resultText.value = "Gagal memproses gambar.";
                console.error(error);
            } finally {
                loading.classList.add('hidden');
            }
        }

        btnCopy.addEventListener('click', () => {
            if (!resultText.value || resultText.value.startsWith("Sedang")) return;
            navigator.clipboard.writeText(resultText.value);
            alert("Teks disalin!");
        });
    </script>
</body>
</html>
