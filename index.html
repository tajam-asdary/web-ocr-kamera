<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web OCR - Kamera ke Teks</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-white rounded-xl shadow-md overflow-hidden p-6 space-y-4">
        <h1 class="text-2xl font-bold text-center text-gray-800">DocuScan to Text</h1>
        <p class="text-sm text-center text-gray-500">Ambil foto dokumen menggunakan kamera HP dan ubah menjadi teks otomatis.</p>
        
        <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden flex items-center justify-center">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
            <img id="scanned-image" class="hidden w-full h-full object-cover" src="" alt="Hasil foto">
        </div>

        <div class="flex flex-col gap-2">
            <button id="btn-capture" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition">
                📸 Ambil Foto Dokumen
            </button>
            <button id="btn-retry" class="hidden w-full bg-gray-500 hover:bg-gray-600 text-white font-medium py-2.5 px-4 rounded-lg transition">
                🔄 Ulangi Foto
            </button>
        </div>

        <div id="loading" class="hidden text-center text-sm font-semibold text-blue-600 animate-pulse">
            ⏳ Sedang mengekstrak teks (OCR)... <span id="progress">0%</span>
        </div>

        <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">Hasil Ekstraksi Teks:</label>
            <textarea id="result-text" class="w-full h-40 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" placeholder="Teks dari dokumen akan muncul di sini..." readonly></textarea>
        </div>
        
        <button id="btn-copy" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition">
            📋 Salin Teks
        </button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const scannedImage = document.getElementById('scanned-image');
        const btnCapture = document.getElementById('btn-capture');
        const btnRetry = document.getElementById('btn-retry');
        const btnCopy = document.getElementById('btn-copy');
        const loading = document.getElementById('loading');
        const progressSpan = document.getElementById('progress');
        const resultText = document.getElementById('result-text');

        // 1. Mengakses Kamera Belakang HP (Environment)
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }, // Mengutamakan kamera belakang
                    audio: false
                });
                video.srcObject = stream;
                video.classList.remove('hidden');
                scannedImage.classList.add('hidden');
                btnCapture.classList.remove('hidden');
                btnRetry.classList.add('hidden');
            } catch (err) {
                alert("Gagal mengakses kamera. Pastikan memberikan izin akses kamera.");
                console.error(err);
            }
        }

        // Jalankan kamera saat halaman dimuat
        window.addEventListener('DOMContentLoaded', startCamera);

        // 2. Mengambil Gambar dari Video Stream
        btnCapture.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Gambar frame video ke canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Ubah canvas menjadi URL Gambar (base64)
            const dataUrl = canvas.toDataURL('image/jpeg');
            
            // Tampilkan hasil foto dan sembunyikan video
            scannedImage.src = dataUrl;
            scannedImage.classList.remove('hidden');
            video.classList.add('hidden');
            
            // Atur tombol
            btnCapture.classList.add('hidden');
            btnRetry.classList.remove('hidden');

            // Matikan stream kamera sementara agar hemat baterai
            const stream = video.srcObject;
            const tracks = stream.getTracks();
            tracks.forEach(track => track.stop());

            // Jalankan Proses OCR
            processOCR(dataUrl);
        });

        // 3. Mengulang Kamera jika Foto Kurang Jelas
        btnRetry.addEventListener('click', () => {
            resultText.value = "";
            startCamera();
        });

        // 4. Proses Ekstraksi Gambar ke Teks (OCR)
        async function processOCR(imageSrc) {
            loading.classList.remove('hidden');
            resultText.value = "Sedang memproses...";
            
            try {
                // Tesseract memproses gambar (bisa mengenali bahasa Indonesia & Inggris)
                const result = await Tesseract.recognize(
                    imageSrc,
                    'ind+eng', // Menggunakan bahasa Indonesia dan Inggris
                    {
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                progressSpan.innerText = Math.floor(m.progress * 100) + "%";
                            }
                        }
                    }
                );
                
                // Tampilkan hasil teks ke textarea
                resultText.value = result.data.text || "Tidak ada teks yang terdeteksi.";
            } catch (error) {
                resultText.value = "Terjadi kesalahan saat memproses gambar.";
                console.error(error);
            } finally {
                loading.classList.add('hidden');
            }
        }

        // 5. Fitur Salin Teks ke Clipboard
        btnCopy.addEventListener('click', () => {
            if (!resultText.value || resultText.value === "Sedang memproses...") {
                alert("Belum ada teks yang bisa disalin.");
                return;
            }
            navigator.clipboard.writeText(resultText.value);
            alert("Teks berhasil disalin ke clipboard!");
        });
    </script>
</body>
</html>
