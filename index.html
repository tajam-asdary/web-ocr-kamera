<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Smart OCR 1/2 Layar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col justify-between font-sans p-4 overflow-hidden">

    <div class="w-full max-w-md mx-auto flex flex-col h-full justify-between space-y-3">
        
        <div class="text-center py-1">
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">Gemini Document Scanner</h1>
            <p class="text-[10px] text-gray-400">Akurasi Setara Google Lens • 1/2 Layar Kamera</p>
        </div>
        
        <div class="relative w-full h-[50vh] bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-800 flex items-center justify-center">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
            <img id="scanned-image" class="hidden w-full h-full object-cover" src="" alt="Hasil foto">

            <div id="loading" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center space-y-2 z-10">
                <div class="w-9 h-9 border-4 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-xs text-blue-400 animate-pulse">Gemini AI sedang mengekstrak teks...</p>
            </div>
        </div>

        <div class="flex-grow flex flex-col min-h-0 space-y-1">
            <label class="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Hasil Teks AI:</label>
            <textarea id="result-text" class="w-full flex-grow p-3 bg-gray-900 border border-gray-800 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-xs text-gray-200 resize-none overflow-y-auto" placeholder="Hasil ekstraksi teks super akurat akan muncul di sini..." readonly></textarea>
        </div>
        
        <div class="pb-2">
            <button id="btn-capture" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-semibold py-3 rounded-xl shadow-lg transition text-sm">
                📸 Ambil Foto Dokumen
            </button>
            
            <div id="action-group" class="hidden flex gap-2">
                <button id="btn-retry" class="w-1/3 bg-gray-800 hover:bg-gray-700 active:scale-95 text-white font-semibold py-3 rounded-xl transition text-sm">
                    🔄 Ulangi
                </button>
                <button id="btn-copy" class="w-2/3 bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-bold py-3 rounded-xl transition text-sm">
                    📋 Salin Teks
                </button>
            </div>
        </div>

    </div>

    <script>
        // ============================================
        // MASUKKAN API KEY GEMINI KAMU DI SINI
        // ============================================
        const GEMINI_API_KEY = "AQ.Ab8RN6IyCSkXqF3rEMjB12IrfCLVD6MRFoxWsdm74wVLnOwT3A"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const scannedImage = document.getElementById('scanned-image');
        const btnCapture = document.getElementById('btn-capture');
        const actionGroup = document.getElementById('action-group');
        const btnRetry = document.getElementById('btn-retry');
        const btnCopy = document.getElementById('btn-copy');
        const loading = document.getElementById('loading');
        const resultText = document.getElementById('result-text');

        // Buka Kamera Belakang HP
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
                video.classList.remove('hidden');
                scannedImage.classList.add('hidden');
                btnCapture.classList.remove('hidden');
                actionGroup.classList.add('hidden');
            } catch (err) {
                alert("Mohon izinkan akses kamera di browser HP Anda.");
            }
        }

        window.addEventListener('DOMContentLoaded', startCamera);

        // Ambil Gambar
        btnCapture.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            scannedImage.src = dataUrl;
            scannedImage.classList.remove('hidden');
            video.classList.add('hidden');
            
            btnCapture.classList.add('hidden');
            actionGroup.classList.remove('hidden');

            const stream = video.srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());

            // Kirim gambar ke Gemini AI
            processWithGemini(dataUrl);
        });

        btnRetry.addEventListener('click', () => {
            resultText.value = "";
            startCamera();
        });

        // Fungsi Memproses Gambar Menggunakan Google Gemini API
        async function processWithGemini(base64DataUrl) {
            if (GEMINI_API_KEY === "MASUKKAN_API_KEY_GEMINI_KAMU_DI_SINI") {
                resultText.value = "AQ.Ab8RN6IyCSkXqF3rEMjB12IrfCLVD6MRFoxWsdm74wVLnOwT3A";
                return;
            }

            loading.classList.remove('hidden');
            resultText.value = "Gemini sedang membaca dokumen Anda...";

            try {
                // Bersihkan header base64 untuk mengambil data murninya saja
                const base64Content = base64DataUrl.split(',');

                // Struktur data request sesuai standar dokumentasi Google Gemini
                const requestBody = {
                    contents: [{
                        parts: [
                            { text: "Tolong salin semua teks yang ada di dalam gambar dokumen ini dengan sangat akurat. Ketik ulang teksnya saja tanpa penjelasan tambahan apapun." },
                            {
                                inlineData: {
                                    mimeType: "image/jpeg",
                                    data: base64Content
                                }
                            }
                        ]
                    }]
                };

                // Panggil endpoint model Gemini 2.5 Flash (Sangat cepat dan hebat dalam membaca gambar)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });

                const result = await response.json();
                
                // Ambil teks balasan dari AI
                if (result.candidates && result.candidates.content.parts.text) {
                    resultText.value = result.candidates.content.parts.text.trim();
                } else {
                    resultText.value = "Gagal mengekstrak teks. Coba foto ulang dengan posisi lebih jelas.";
                }

            } catch (error) {
                resultText.value = "Terjadi kesalahan sambungan ke Google Gemini AI.";
                console.error(error);
            } finally {
                loading.classList.add('hidden');
            }
        }

        btnCopy.addEventListener('click', () => {
            if (!resultText.value || resultText.value.startsWith("Gemini") || resultText.value.startsWith("⚠️")) return;
            navigator.clipboard.writeText(resultText.value);
            alert("Teks berhasil disalin!");
        });
    </script>
</body>
</html>
