<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web OCR - Kamera ke Teks</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-between p-4 font-sans">

    <div class="w-full max-w-md mx-auto flex flex-col flex-grow justify-between space-y-4">
        
        <div class="text-center py-2">
            <h1 class="text-2xl font-bold tracking-wide text-blue-400">DocuScan Mobile</h1>
            <p class="text-xs text-gray-400">Pindai dokumen langsung ke teks</p>
        </div>
        
        <div class="relative w-full aspect-[3/4] bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-800 flex items-center justify-center">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            
            <canvas id="canvas" class="hidden"></canvas>
            
            <img id="scanned-image" class="hidden w-full h-full object-cover" src="" alt="Hasil foto">

            <div id="loading" class="hidden absolute inset-0 bg-black/70 flex flex-col items-center justify-center space-y-3 z-10">
                <div class="w-12 h-12 border-4 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-sm font-medium text-blue-400 animate-pulse">Mengekstrak Teks... <span id="progress">0%</span></p>
            </div>
        </div>

        <div class="flex-grow flex flex-col space-y-1">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Hasil Teks:</label>
            <textarea id="result-text" class="w-full flex-grow h-32 p-3 bg-gray-800 border border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm text-gray-200 resize-none" placeholder="Teks dokumen akan muncul di sini setelah difoto..." readonly></textarea>
        </div>
        
        <div class="space-y-2 pt-2">
            <button id="btn-capture" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-semibold py-3 px-4 rounded-xl shadow-lg transition duration-200 text-base flex items-center justify-center gap-2">
                📸 Ambil Foto Dokumen
            </button>
            
            <div id="action-group" class="hidden flex gap-2">
                <button id="btn-retry" class="w-1/2 bg-gray-700 hover:bg-gray-600 active:scale-95 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 text-sm">
                    🔄 Ulangi Foto
                </button>
                <button id="btn-copy" class="w-1/2 bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 text-sm">
                    📋 Salin Teks
                </button>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const scannedImage = document.getElementById('scanned-image');
        const btnCapture = document.getElementById('btn-capture');
        const actionGroup = document.getElementById('action-group');
        const btnRetry = document.getElementById('btn-retry');
        const btnCopy = document.getElementById('btn-copy');
        const loading = document.getElementById('loading');
        const progressSpan = document.getElementById('progress');
        const resultText = document.getElementById('result-text');

        // 1. Mengakses Kamera HP dengan Resolusi Optimal
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: { ideal: "environment" },
                        // Meminta resolusi tinggi agar teks dokumen terbaca jelas saat di-OCR
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });
                video.srcObject = stream;
                video.classList.remove('hidden');
                scannedImage.classList.add('hidden');
                btnCapture.classList.remove('hidden');
                actionGroup.classList.add('hidden');
            } catch (err) {
                alert("Izin kamera ditolak atau perangkat tidak mendukung.");
                console.error(err);
            }
        }

        window.addEventListener('DOMContentLoaded', startCamera);

        // 2. Ambil Gambar Sesuai Resolusi Kamera Asli
        btnCapture.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            
            // Mengatur ukuran canvas sesuai resolusi video asli, bukan ukuran layar web
            // Ini penting agar hasil foto tetap tajam saat dibaca oleh AI OCR
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9); // Kualitas 90%
            
            scannedImage.src = dataUrl;
            scannedImage.classList.remove('hidden');
            video.classList.add('hidden');
            
            btnCapture.classList.add('hidden');
            actionGroup.classList.remove('hidden');

            // Matikan stream kamera biar hemat baterai HP
            const stream = video.srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            processOCR(dataUrl);
        });

        // 3. Mengulangi Foto
        btnRetry.addEventListener('click', () => {
            resultText.value = "";
            startCamera();
        });

        // 4. Proses OCR (Gambar -> Teks)
        async function processOCR(imageSrc) {
            loading.classList.remove('hidden');
            resultText.value = "Sedang memproses teks...";
            
            try {
                const result = await Tesseract.recognize(
                    imageSrc,
                    'ind+eng',
                    {
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                progressSpan.innerText = Math.floor(m.progress * 100) + "%";
                            }
                        }
                    }
                );
                
                resultText.value = result.data.text || "Teks tidak terbaca. Coba foto lebih dekat atau cari cahaya yang lebih terang.";
            } catch (error) {
                resultText.value = "Gagal memproses gambar.";
                console.error(error);
            } finally {
                loading.classList.add('hidden');
            }
        }

        // 5. Salin Teks
        btnCopy.addEventListener('click', () => {
            if (!resultText.value || resultText.value.startsWith("Sedang")) return;
            navigator.clipboard.writeText(resultText.value);
            alert("Teks disalin!");
        });
    </script>
</body>
</html>
